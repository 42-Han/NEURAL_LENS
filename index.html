<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL LENS | V23</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --accent: #00f2ff;
            --ui-bg: rgba(10, 20, 30, 0.85);
            --ui-border: rgba(0, 242, 255, 0.3);
            --panel-w: 340px;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
        }

        #viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .landing-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 30; transition: var(--transition);
            width: 100%; display: flex; flex-direction: column; align-items: center;
        }
        .landing-container.active { top: 40px; left: calc(100% - 40px); transform: translate(-100%, 0); width: auto; align-items: flex-end; }

        .pixel-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 64px; color: var(--accent);
            text-shadow: 0 0 30px rgba(0, 242, 255, 0.6), 0 0 60px rgba(0, 242, 255, 0.3);
            margin-bottom: 50px; letter-spacing: 10px; transition: var(--transition);
        }
        .landing-container.active .pixel-title { font-size: 16px; margin-bottom: 0; letter-spacing: 2px; }

        #initBtn {
            font-size: 16px; padding: 18px 40px; letter-spacing: 3px; 
            border-width: 2px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            display: inline-block;
        }

        .glass-panel {
            position: fixed; top: 30px; left: 30px; bottom: 30px; width: var(--panel-w);
            background: var(--ui-bg); backdrop-filter: blur(30px);
            border: 1px solid var(--ui-border); z-index: 20;
            transition: var(--transition);
            padding: 30px 25px; box-sizing: border-box; 
            display: flex; flex-direction: column; border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            transform: translateX(-450px); opacity: 0;
        }
        .glass-panel.show { transform: translateX(0); opacity: 1; }
        .glass-panel.hidden { transform: translateX(-450px); opacity: 0; }

        .ui-toggle-trigger {
            position: fixed; top: 50%; left: 0; width: 30px; height: 100px;
            transform: translateY(-50%); z-index: 25; cursor: pointer; display: none;
            align-items: center; justify-content: center;
            transition: opacity 0.3s;
        }
        .trigger-line { width: 3px; height: 40px; background: var(--accent); box-shadow: 0 0 15px var(--accent); border-radius: 2px; }

        .control-group { margin-bottom: 20px; width: 100%; }
        .label-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .label-box span:first-child { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; }
        .label-box span:last-child { font-family: monospace; font-size: 12px; color: var(--accent); }
        
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; background: var(--accent); border-radius: 50%; cursor: pointer; box-shadow: 0 0 10px var(--accent); }
        input[type="range"]:disabled::-webkit-slider-thumb { background: #555; box-shadow: none; cursor: not-allowed; }

        .input-field { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--ui-border); padding: 10px; color: #fff; font-size: 12px; border-radius: 4px; outline: none; box-sizing: border-box; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .action-btn { background: transparent; border: 1px solid var(--ui-border); color: #fff; padding: 10px; font-size: 10px; cursor: pointer; border-radius: 4px; transition: 0.2s; text-transform: uppercase; text-align: center; }
        .action-btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .action-btn.primary { border-color: var(--accent); color: var(--accent); font-weight: bold; }
        #initBtn:hover, #panel .action-btn.primary:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .dl-btn { font-size: 9px; padding: 10px 0; border: 1px solid rgba(0,242,255,0.2); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; border-radius: 4px; transition: 0.2s;}
        .dl-btn:hover { background: var(--accent); color: #000; }

        #recordBtn { border: 2px solid #00ffaa; color: #00ffaa; font-weight: bold; width: 100%; margin-top: 8px; background: transparent; transition: 0.3s; }
        #recordBtn:hover { background: #00ffaa; color: #000; }

        .loader-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pulse-loader { width: 50px; height: 50px; border: 2px solid var(--accent); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 200; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(8px);
            opacity: 0; transition: opacity 0.3s;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-box { background: var(--ui-bg); border: 1px solid var(--ui-border); padding: 35px 30px; border-radius: 12px; width: 340px; box-sizing: border-box; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
        .modal-title { font-size: 14px; color: var(--accent); margin-bottom: 25px; letter-spacing: 3px; text-align: center; }
        .dl-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }

        @keyframes pulseRec { 0% { box-shadow: 0 0 10px red; } 50% { box-shadow: 0 0 35px red; } 100% { box-shadow: 0 0 10px red; } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
</head>
<body>

    <div id="viewport"></div>

    <div class="landing-container" id="landing">
        <div class="pixel-title">NEURAL LENS</div>
        
        <label class="action-btn primary" id="initBtn">
            INITIALIZE SCANNER
            <input type="file" id="imageInput" style="display:none;" accept="image/*">
        </label>
    </div>

    <div class="loader-screen" id="loader">
        <div class="pulse-loader"></div>
        <div id="loaderText" style="margin-top: 25px; font-size: 11px; letter-spacing: 5px; color: var(--accent); font-family: monospace;">ANALYZING_TOPOLOGY...</div>
    </div>

    <div class="ui-toggle-trigger" id="openUI"><div class="trigger-line"></div></div>

    <div class="modal-overlay" id="exportModal">
        <div class="modal-box">
            <div class="modal-title">EXPORT BUFFER</div>
            <input type="text" id="fileName" class="input-field" placeholder="Filename..." value="NEURAL_LENS_RECON">
            
            <div class="dl-grid">
                <button class="dl-btn" onclick="exportFile('png')">PNG</button>
                <button class="dl-btn" onclick="exportFile('jpeg')">JPG</button>
                <button class="dl-btn" onclick="exportFile('svg')">SVG</button>
                <button class="dl-btn" onclick="exportFile('gif')" style="border-color: #ff0055; color: #ff0055; font-weight: bold;">GIF (3s)</button>
            </div>
            
            <button class="action-btn" id="recordBtn" onclick="startVideoRecording()">RECORD VIDEO</button>
            <button class="action-btn" onclick="closeExportModal()" style="margin-top:25px; width:100%; border: none; opacity: 0.6;">CANCEL</button>
        </div>
    </div>

    <div class="glass-panel" id="panel">
        <div style="margin-bottom: 25px;">
            <label class="action-btn" style="display:block; font-size: 9px; border-style: dashed;">
                RE-UPLOAD SOURCE
                <input type="file" id="reInput" style="display:none;" accept="image/*">
            </label>
        </div>

        <div style="flex: 1; overflow-y: auto; padding-right: 5px;">
            
            <div class="control-group">
                <div class="label-box"><span>AI Enhancements</span></div>
                <div class="grid-2">
                    <button class="dl-btn" id="btnLoadDepth" style="border-color: var(--accent); color: var(--accent);">3D DEPTH</button>
                    <button class="dl-btn" id="btnLoadEdge" style="border-color: var(--accent); color: var(--accent);">CONTOUR</button>
                </div>
                <div id="aiProgressBox" style="display:none; margin-top:8px; background: rgba(0,0,0,0.3); padding: 8px; border: 1px solid var(--ui-border); border-radius: 4px;">
                    <div style="font-size: 9px; color: var(--accent); margin-bottom: 5px; font-family: monospace;" id="aiProgressText">DOWNLOADING...</div>
                    <div style="width: 100%; height: 2px; background: rgba(255,255,255,0.1);">
                        <div id="aiProgressBar" style="width: 0%; height: 100%; background: var(--accent); transition: width 0.2s;"></div>
                    </div>
                </div>
            </div>

            <div class="control-group">
                <div class="label-box"><span>Glyph Mode</span></div>
                <select id="glyphMode" class="input-field">
                    <option value="none">Point Cloud</option>
                    <option value="custom">Custom Glyph (1-10 Chars)</option>
                    <option value="random">Glitch Matrix</option>
                </select>
                <input type="text" id="glyphInput" class="input-field" style="margin-top:8px; display:none;" placeholder="Enter up to 10 chars" maxlength="10">
                
                <div id="randomCategories" style="display:none; margin-top:8px; background: rgba(0,0,0,0.3); border: 1px solid var(--ui-border); border-radius: 4px; padding: 12px;">
                    <label style="display:flex; align-items:center; font-size:10px; color:#fff; margin-bottom:8px; cursor:pointer;">
                        <input type="checkbox" id="catNumbers" checked style="margin-right:8px; accent-color: var(--accent);"> Numbers (0-9)
                    </label>
                    <label style="display:flex; align-items:center; font-size:10px; color:#fff; margin-bottom:8px; cursor:pointer;">
                        <input type="checkbox" id="catLetters" checked style="margin-right:8px; accent-color: var(--accent);"> Letters (A-Z)
                    </label>
                    <label style="display:flex; align-items:center; font-size:10px; color:#fff; cursor:pointer;">
                        <input type="checkbox" id="catSymbols" checked style="margin-right:8px; accent-color: var(--accent);"> Symbols (!?@...)
                    </label>
                </div>
            </div>

            <div class="control-group">
                <div class="label-box"><span>Point Size</span><span id="v-psize">3.0</span></div>
                <input type="range" id="psizeRange" min="0.5" max="150" step="0.5" value="3.0">
            </div>

            <div class="control-group">
                <div class="label-box"><span>Sampling Stride</span><span id="v-stride">4</span></div>
                <input type="range" id="strideRange" min="2" max="50" value="4">
            </div>

            <div class="control-group">
                <div class="label-box"><span>Flicker Freq</span><span id="v-flicker">2.0</span></div>
                <input type="range" id="flickerRange" min="0" max="10" step="0.1" value="2.0">
            </div>

            <div class="control-group">
                <div class="label-box"><span>4D Diffusion</span><span id="v-diffuse">0.6</span></div>
                <input type="range" id="diffuseRange" min="0" max="1" step="0.05" value="0.6">
            </div>

            <div class="control-group" id="depthControlGroup" style="opacity: 0.4; pointer-events: none;">
                <div class="label-box"><span>Z-Intensity (Needs Depth)</span><span id="v-depth">200</span></div>
                <input type="range" id="depthRange" min="0" max="800" value="200" disabled>
            </div>

            <div class="control-group">
                <div class="label-box"><span>Zoom / Magnify</span><span id="v-zoom">20</span></div>
                <input type="range" id="zoomRange" min="0" max="100" value="20">
            </div>

            <div class="control-group">
                <div class="label-box"><span>Camera Memory</span></div>
                <button class="action-btn" id="btnSaveView" style="width:100%; margin-bottom:8px; border-style: dashed;">SAVE CURRENT VIEW</button>
                <div id="savedViewsList" class="grid-2"></div>
            </div>

            <button class="action-btn primary" onclick="openExportModal()" style="width:100%; margin-top:20px;">EXPORT MENU</button>
            <button class="action-btn" id="hidePanel" style="width:100%; margin-top:10px; border:none; opacity: 0.4;">MINIMIZE PANEL</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.15.0"
            }
        }
    </script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec3 vColor;
        varying float vRandomIdx;
        attribute float aRandom;
        uniform float uTime;
        uniform float uPointSize;
        
        void main() {
            vColor = color;
            vRandomIdx = aRandom;
            vec3 pos = position;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = uPointSize * (1000.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vRandomIdx;
        uniform sampler2D uMap;
        uniform bool uUseMap;
        uniform bool uIsRandom;
        uniform float uTime;
        uniform float uCharCount;
        uniform float uFlickerFreq;

        float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }

        void main() {
            vec4 texColor = vec4(1.0);
            if(uUseMap) {
                vec2 uv = gl_PointCoord;
                float grid = 8.0; 
                float limit = uIsRandom ? 64.0 : uCharCount;
                float idx = mod(floor(vRandomIdx + (uIsRandom ? uTime * 0.002 : 0.0)), limit);
                float tx = mod(idx, grid) / grid;
                float ty = floor(idx / grid) / grid;
                uv = (gl_PointCoord / grid) + vec2(tx, ty);
                texColor = texture2D(uMap, uv);
                if(texColor.a < 0.1) discard;
            } else {
                float dist = distance(gl_PointCoord, vec2(0.5));
                if(dist > 0.5) discard;
                texColor.a = 1.0 - smoothstep(0.4, 0.5, dist);
            }

            // 新增：动态频控闪烁算法
            float f = 1.0;
            if (uFlickerFreq > 0.0) {
                float timeVar = uTime * 0.001 * uFlickerFreq;
                float smoothWave = sin(timeVar + vRandomIdx * 10.0) * 0.5 + 1.0;
                float erraticWave = (random(gl_PointCoord.xy + uTime * 0.001 * uFlickerFreq) > 0.8) ? 1.8 : 0.8;
                float blend = clamp((uFlickerFreq - 5.0) / 5.0, 0.0, 1.0);
                f = mix(smoothWave, erraticWave, blend);
            }

            gl_FragColor = vec4(vColor * f, texColor.a * 0.9);
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { pipeline, env } from '@xenova/transformers';

        env.allowLocalModels = false;
        let scene, camera, renderer, controls, points, starfield;
        let depthEstimator, atlasTexture, customAtlasTexture;
        let customCharCount = 1;
        let idleTimer;
        let lastImgSrc = null;
        
        window.isDepthMode = false;
        window.isEdgeMode = false;
        window.camTransition = { active: false, progress: 0 };
        window.savedViews = [];

        let cachedData = { pixels: null, depth: null, edges: null, minZ: 0, maxZ: 1, width: 0, height: 0 };
        const clock = new THREE.Clock();

        window.openExportModal = () => document.getElementById('exportModal').classList.add('show');
        window.closeExportModal = () => document.getElementById('exportModal').classList.remove('show');

        window.exportFile = async (format) => {
            const baseName = document.getElementById('fileName').value || 'NEURAL_LENS_RECON';
            if(format === 'gif') { recordGIF(baseName); return; }
            
            renderer.render(scene, camera);
            
            if(format === 'svg') {
                const dataUrl = renderer.domElement.toDataURL('image/png', 1.0);
                const w = renderer.domElement.width;
                const h = renderer.domElement.height;
                const svgStr = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><image href="${dataUrl}" width="${w}" height="${h}"/></svg>`;
                const blob = new Blob([svgStr], {type: 'image/svg+xml'});
                const link = document.createElement('a');
                link.download = `${baseName}.svg`;
                link.href = URL.createObjectURL(blob);
                link.click();
                closeExportModal();
                return;
            }

            const link = document.createElement('a');
            link.download = `${baseName}.${format}`;
            link.href = renderer.domElement.toDataURL(`image/${format === 'png' ? 'png' : 'jpeg'}`, 0.9);
            link.click();
            closeExportModal();
        };

        window.startVideoRecording = () => {
            closeExportModal();
            const baseName = document.getElementById('fileName').value || 'NEURAL_LENS_RECON';
            
            const stopBtn = document.createElement('button');
            stopBtn.id = 'stopRecBtn';
            stopBtn.innerText = 'STOP RECORDING';
            stopBtn.style.cssText = 'position:fixed; top:40px; left:50%; transform:translateX(-50%); z-index:9999; padding:15px 40px; background:red; color:white; border:2px solid #ffaaaa; border-radius:30px; font-weight:bold; cursor:pointer; font-family:"Press Start 2P", monospace; font-size:12px; animation: pulseRec 1.5s infinite; transition: 0.3s;';
            document.body.appendChild(stopBtn);

            const stream = renderer.domElement.captureStream(30);
            let options = { mimeType: 'video/webm; codecs=vp9' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                options = { mimeType: 'video/webm; codecs=vp8' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/webm' };
            }

            const mediaRecorder = new MediaRecorder(stream, options);
            const recordedChunks = [];

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none'; a.href = url; a.download = `${baseName}.webm`;
                document.body.appendChild(a); a.click();
                setTimeout(() => { document.body.removeChild(a); window.URL.revokeObjectURL(url); }, 100);
                stopBtn.remove();
            };

            mediaRecorder.start();
            stopBtn.onclick = () => mediaRecorder.stop();
        };

        async function recordGIF(name) {
            document.getElementById('exportModal').classList.remove('show');
            document.getElementById('loader').style.display = 'flex';
            const loaderTxt = document.getElementById('loaderText');
            loaderTxt.innerText = 'INITIALIZING_GIF_ENGINE...';
            let workerUrl;
            try {
                const workerBlob = await fetch('https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js').then(r => r.blob());
                workerUrl = URL.createObjectURL(workerBlob);
            } catch(e) { workerUrl = 'https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.worker.js'; }

            const gif = new GIF({ workers: 2, quality: 10, workerScript: workerUrl, width: renderer.domElement.width, height: renderer.domElement.height });
            let count = 0; const maxFrames = 30;
            const capture = setInterval(() => {
                renderer.render(scene, camera);
                gif.addFrame(renderer.domElement, {copy: true, delay: 100});
                count++;
                loaderTxt.innerText = `RECORDING: ${Math.round((count/maxFrames)*100)}%`;
                if(count >= maxFrames) {
                    clearInterval(capture);
                    loaderTxt.innerText = 'ENCODING_GIF...';
                    gif.on('finished', (blob) => {
                        const link = document.createElement('a');
                        link.download = `${name}.gif`;
                        link.href = URL.createObjectURL(blob);
                        link.click();
                        document.getElementById('loader').style.display = 'none';
                    });
                    gif.render();
                }
            }, 100);
        }

        async function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 0, 1000); 

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('viewport').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            createAmbientStars();
            updateRandomAtlas(); 
            animate();

            bindUI();
            setupIdleTimer();
        }

        function setupIdleTimer() {
            const panel = document.getElementById('panel');
            const reset = () => {
                clearTimeout(idleTimer);
                if(panel.classList.contains('show') && !panel.classList.contains('hidden')) {
                    idleTimer = setTimeout(() => panel.classList.add('hidden'), 4000);
                }
            };
            panel.addEventListener('mousemove', reset);
            panel.addEventListener('mousedown', reset);
            panel.addEventListener('input', reset);
        }

        function updateRandomAtlas() {
            const useNum = document.getElementById('catNumbers') ? document.getElementById('catNumbers').checked : true;
            const useLet = document.getElementById('catLetters') ? document.getElementById('catLetters').checked : true;
            const useSym = document.getElementById('catSymbols') ? document.getElementById('catSymbols').checked : true;

            let chars = "";
            if(useNum) chars += "0123456789";
            if(useLet) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            if(useSym) chars += "<>[]{}#@$*&!?%:=+-_^/()*";
            if(chars === "") chars = "0101"; 

            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'white'; ctx.font = 'bold 50px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            
            for(let i=0; i<64; i++) {
                const x = (i % 8) * 64 + 32;
                const y = Math.floor(i / 8) * 64 + 32;
                ctx.fillText(chars[i % chars.length], x, y);
            }
            
            if (atlasTexture) atlasTexture.dispose();
            atlasTexture = new THREE.CanvasTexture(canvas);
            atlasTexture.flipY = false;
            
            if(points && document.getElementById('glyphMode').value === 'random') {
                points.material.uniforms.uMap.value = atlasTexture;
            }
        }

        function createAmbientStars() {
            const count = 15000; 
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            for(let i=0; i<count; i++){
                pos[i*3]=(Math.random()-0.5)*8000;
                pos[i*3+1]=(Math.random()-0.5)*8000;
                pos[i*3+2]=(Math.random()-0.5)*8000;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
            starfield = new THREE.Points(geo, new THREE.PointsMaterial({size: 4, color: 0x00f2ff, transparent: true, opacity: 0.7, blending: THREE.AdditiveBlending}));
            scene.add(starfield);
        }

        function bindUI() {
            const handleUpload = async (e) => {
                const file = e.target.files[0]; if(!file) return;
                document.getElementById('loader').style.display = 'flex';
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    lastImgSrc = ev.target.result;
                    img.onload = () => {
                        const width = img.width, height = img.height;
                        const canv = document.createElement('canvas'); canv.width = width; canv.height = height;
                        const ctx = canv.getContext('2d'); ctx.drawImage(img, 0, 0, width, height);
                        
                        // 初始零深度单维解析
                        const flatDepth = new Float32Array(width * height).fill(0);
                        cachedData = { pixels: ctx.getImageData(0, 0, width, height).data, depth: flatDepth, edges: null, width, height, minZ: 0, maxZ: 1 };
                        
                        renderTopology();
                        
                        document.getElementById('zoomRange').value = 20;
                        document.getElementById('v-zoom').innerText = 20;
                        applyZoom(20);

                        document.getElementById('landing').classList.add('active');
                        document.getElementById('panel').classList.add('show');
                        document.getElementById('openUI').style.display = 'flex';
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('initBtn').style.display = 'none';
                    };
                };
                reader.readAsDataURL(file);
            };

            document.getElementById('imageInput').onchange = handleUpload;
            document.getElementById('reInput').onchange = handleUpload;
            document.getElementById('hidePanel').onclick = () => document.getElementById('panel').classList.add('hidden');
            document.getElementById('openUI').onclick = () => document.getElementById('panel').classList.toggle('hidden');

            // AI 模块按需加载
            document.getElementById('btnLoadDepth').onclick = async function() {
                if(!cachedData.pixels || window.isDepthMode) return;
                this.innerText = "LOADING...";
                document.getElementById('aiProgressBox').style.display = 'block';

                if(!depthEstimator) {
                    depthEstimator = await pipeline('depth-estimation', 'Xenova/depth-anything-small-hf', {
                        progress_callback: (d) => {
                            if (d.status === 'progress') {
                                const p = Math.max(0, Math.min(100, Math.round(d.progress)));
                                document.getElementById('aiProgressBar').style.width = p + '%';
                                document.getElementById('aiProgressText').innerText = `DOWNLOADING 3D CORE... ${p}%`;
                            }
                        }
                    });
                }
                
                document.getElementById('aiProgressText').innerText = `ANALYZING DEPTH...`;
                await new Promise(r => setTimeout(r, 50)); 
                const result = await depthEstimator(lastImgSrc);
                const depthInfo = result.depth;
                
                let minZ = Infinity, maxZ = -Infinity;
                for(let v of depthInfo.data) { if(v < minZ) minZ = v; if(v > maxZ) maxZ = v; }
                cachedData.depth = depthInfo.data; cachedData.minZ = minZ; cachedData.maxZ = maxZ;
                
                window.isDepthMode = true;
                document.getElementById('aiProgressBox').style.display = 'none';
                this.innerText = "3D DEPTH: ACTIVE";
                this.style.background = "var(--accent)";
                this.style.color = "#000";

                const dGroup = document.getElementById('depthControlGroup');
                dGroup.style.opacity = '1';
                dGroup.style.pointerEvents = 'auto';
                document.getElementById('depthRange').disabled = false;
                renderTopology();
            };

            document.getElementById('btnLoadEdge').onclick = async function() {
                if(!cachedData.pixels) return;
                if(window.isEdgeMode) {
                    window.isEdgeMode = false;
                    this.innerText = "CONTOUR: OFF";
                    this.style.background = "transparent";
                    this.style.color = "var(--accent)";
                    renderTopology();
                    return;
                }
                
                if(!cachedData.edges) {
                    this.innerText = "LOADING...";
                    document.getElementById('aiProgressBox').style.display = 'block';
                    for(let i=0; i<=100; i+=25) {
                        document.getElementById('aiProgressBar').style.width = i + '%';
                        document.getElementById('aiProgressText').innerText = `DOWNLOADING EDGE KERNEL... ${i}%`;
                        await new Promise(r => setTimeout(r, 100));
                    }
                    document.getElementById('aiProgressText').innerText = `EXTRACTING CONTOURS...`;
                    await new Promise(r => setTimeout(r, 100));

                    const w = cachedData.width, h = cachedData.height, px = cachedData.pixels;
                    const edges = new Uint8Array(w * h);
                    for(let y=1; y<h-1; y++){
                        for(let x=1; x<w-1; x++){
                            const i = (y*w + x)*4, right = (y*w + (x+1))*4, down = ((y+1)*w + x)*4;
                            const l = px[i]*0.3 + px[i+1]*0.59 + px[i+2]*0.11;
                            const lr = px[right]*0.3 + px[right+1]*0.59 + px[right+2]*0.11;
                            const ld = px[down]*0.3 + px[down+1]*0.59 + px[down+2]*0.11;
                            edges[y*w + x] = (Math.abs(l - lr) + Math.abs(l - ld)) > 20 ? 1 : 0;
                        }
                    }
                    cachedData.edges = edges;
                    document.getElementById('aiProgressBox').style.display = 'none';
                }
                window.isEdgeMode = true;
                this.innerText = "CONTOUR: ACTIVE";
                this.style.background = "var(--accent)";
                this.style.color = "#000";
                renderTopology();
            };

            // 滑块控制
            const sliders = ['strideRange', 'psizeRange', 'zoomRange', 'depthRange', 'diffuseRange', 'flickerRange'];
            sliders.forEach(id => {
                document.getElementById(id).oninput = (e) => {
                    const val = parseFloat(e.target.value);
                    document.getElementById('v-'+id.split('R')[0]).innerText = val;
                    if(id === 'strideRange' || id === 'diffuseRange') renderTopology();
                    else if(id === 'psizeRange' && points) points.material.uniforms.uPointSize.value = val;
                    else if(id === 'flickerRange' && points) points.material.uniforms.uFlickerFreq.value = val;
                    else if(id === 'zoomRange') applyZoom(val);
                    else if(id === 'depthRange' && points && window.isDepthMode) points.scale.z = val / 200;
                };
            });

            document.getElementById('glyphMode').onchange = (e) => {
                const mode = e.target.value;
                document.getElementById('glyphInput').style.display = (mode === 'custom') ? 'block' : 'none';
                document.getElementById('randomCategories').style.display = (mode === 'random') ? 'block' : 'none';
                if(mode === 'random') updateRandomAtlas();
                renderTopology(); 
            };

            ['catNumbers', 'catLetters', 'catSymbols'].forEach(id => {
                document.getElementById(id).onchange = () => {
                    updateRandomAtlas();
                    renderTopology();
                };
            });

            document.getElementById('glyphInput').oninput = (e) => {
                const chars = e.target.value.trim().split('');
                if(chars.length === 0) return;
                customCharCount = chars.length;
                const canv = document.createElement('canvas'); canv.width = 512; canv.height = 512;
                const ctx = canv.getContext('2d'); ctx.fillStyle = 'white'; ctx.font = 'bold 64px monospace';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                chars.forEach((c, i) => {
                    const x = (i % 8) * 64 + 32; const y = Math.floor(i / 8) * 64 + 32;
                    ctx.fillText(c, x, y);
                });
                customAtlasTexture = new THREE.CanvasTexture(canv);
                customAtlasTexture.flipY = false;
                renderTopology();
            };

            // 保存与切换镜头
            document.getElementById('btnSaveView').onclick = () => {
                const v = { pos: camera.position.clone(), target: controls.target.clone() };
                window.savedViews.push(v);
                const idx = window.savedViews.length;
                const btn = document.createElement('button');
                btn.className = 'dl-btn';
                btn.innerText = `VIEW ${idx}`;
                btn.onclick = () => {
                    window.camTransition = {
                        active: true, progress: 0,
                        startPos: camera.position.clone(), startTgt: controls.target.clone(),
                        endPos: v.pos, endTgt: v.target
                    };
                };
                document.getElementById('savedViewsList').appendChild(btn);
            };

            const views = {'v-front':[0,0,1], 'v-top':[0,1,0], 'v-left':[-1,0,0], 'v-right':[1,0,0]};
            Object.keys(views).forEach(k => {
                const element = document.getElementById(k);
                if(element) {
                    element.onclick = () => {
                        const d = camera.position.length();
                        window.camTransition = {
                            active: true, progress: 0,
                            startPos: camera.position.clone(), startTgt: controls.target.clone(),
                            endPos: new THREE.Vector3(views[k][0]*d, views[k][1]*d, views[k][2]*d), endTgt: new THREE.Vector3(0,0,0)
                        };
                    };
                }
            });
        }

        function applyZoom(val) {
            let dist;
            if(val <= 20) { dist = 3000 - (val * 75); } 
            else { dist = 1500 - ((val - 20) * 16.875); }
            camera.position.setLength(dist);
            controls.update();
        }

        function renderTopology() {
            if(!cachedData.pixels) return;
            const { pixels, depth, width, height, minZ, maxZ } = cachedData;
            const stride = parseInt(document.getElementById('strideRange').value);
            const diffStr = parseFloat(document.getElementById('diffuseRange').value);
            const zInten = parseFloat(document.getElementById('depthRange').value);
            const freq = parseFloat(document.getElementById('flickerRange').value);
            const pos = [], col = [], rnd = [];
            const cx = width/2, cy = height/2, border = Math.max(width, height) * 0.5;
            const mode = document.getElementById('glyphMode').value;

            for (let y = 0; y < height; y += stride) {
                for (let x = 0; x < width; x += stride) {
                    const idx = y * width + x;
                    
                    // 边缘模式过滤
                    if(window.isEdgeMode && cachedData.edges && cachedData.edges[idx] === 0) continue;

                    const d = Math.max(Math.abs(x - cx)/border, Math.abs(y - cy)/border);
                    if(Math.random() < d * diffStr * 1.5) continue;
                    
                    const nz = window.isDepthMode ? (depth[idx] - minZ) / (maxZ - minZ || 1) : 0;
                    pos.push(x - cx, cy - y, nz * zInten);
                    col.push(pixels[idx*4]/255, pixels[idx*4+1]/255, pixels[idx*4+2]/255);
                    rnd.push(Math.floor(Math.random() * (mode === 'random' ? 64 : customCharCount)));
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
            geo.setAttribute('aRandom', new THREE.Float32BufferAttribute(rnd, 1));
            geo.center();

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uPointSize: { value: parseFloat(document.getElementById('psizeRange').value) },
                    uMap: { value: (mode === 'random' ? atlasTexture : customAtlasTexture) },
                    uUseMap: { value: (mode !== 'none') },
                    uIsRandom: { value: (mode === 'random') },
                    uCharCount: { value: customCharCount },
                    uFlickerFreq: { value: freq }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, vertexColors: true, depthWrite: false, blending: THREE.AdditiveBlending
            });

            if(points) scene.remove(points);
            if(starfield) starfield.visible = false;
            points = new THREE.Points(geo, mat);
            
            const vFov = camera.fov * Math.PI / 180;
            const visibleHeightAtInit = 2 * Math.tan(vFov / 2) * 1500;
            const s = (visibleHeightAtInit * 0.75) / Math.max(width, height);
            points.scale.set(s, s, s);
            // Depth mode scale correction
            if(window.isDepthMode) points.scale.z = zInten / 200;

            scene.add(points);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            
            // 镜头平滑过渡动画
            if(window.camTransition && window.camTransition.active) {
                window.camTransition.progress += 0.02;
                let p = window.camTransition.progress;
                if(p >= 1) { p = 1; window.camTransition.active = false; }
                const ease = 1 - Math.pow(1 - p, 3); // Cubic Out
                camera.position.lerpVectors(window.camTransition.startPos, window.camTransition.endPos, ease);
                controls.target.lerpVectors(window.camTransition.startTgt, window.camTransition.endTgt, ease);
            }

            if(starfield && starfield.visible) starfield.rotation.y += 0.001;
            if(points) points.material.uniforms.uTime.value = t * 1000;
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
