<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL | Professional Recon V9</title>
    <style>
        :root {
            --accent: #00f2ff;
            --ui-bg: rgba(2, 8, 15, 0.85);
            --ui-border: rgba(0, 242, 255, 0.3);
            --panel-w: 320px;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: "JetBrains Mono", monospace; overflow: hidden;
        }

        #viewport { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* 悬浮控制面板 */
        .side-panel {
            position: fixed; top: 20px; left: 20px; bottom: 20px; width: var(--panel-w);
            background: var(--ui-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--ui-border); z-index: 20;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            padding: 30px; box-sizing: border-box; display: flex; flex-direction: column;
            border-radius: 4px; box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .side-panel.hidden { transform: translateX(calc(-100% - 40px)); opacity: 0; }

        /* 纯净模式唤起条 */
        .ui-trigger {
            position: fixed; top: 0; left: 0; width: 10px; height: 100%;
            z-index: 21; cursor: pointer; transition: 0.3s;
        }
        .ui-trigger:hover { background: rgba(0, 242, 255, 0.2); }

        .toggle-btn {
            position: absolute; right: -15px; top: 50px; width: 30px; height: 30px;
            background: var(--accent); color: #000; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; clip-path: polygon(0 0, 100% 50%, 0 100%);
        }

        .header { border-left: 3px solid var(--accent); padding-left: 12px; margin-bottom: 25px; }
        .header h1 { margin: 0; font-size: 13px; letter-spacing: 3px; color: var(--accent); }

        .control-row { margin-bottom: 18px; }
        .label-row { display: flex; justify-content: space-between; font-size: 9px; margin-bottom: 8px; color: var(--accent); opacity: 0.7; }
        
        input[type="range"] {
            -webkit-appearance: none; width: 100%; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 3px; outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer;
        }

        .text-input {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--ui-border);
            padding: 10px; color: var(--accent); font-family: inherit; font-size: 11px; outline: none;
        }

        .view-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        
        .btn {
            border: 1px solid var(--ui-border); color: #fff; background: rgba(255,255,255,0.05);
            width: 100%; padding: 10px; font-size: 9px; cursor: pointer; transition: 0.2s;
        }
        .btn:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-primary { border-color: var(--accent); color: var(--accent); margin-bottom: 20px; }

        .loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 10px; color: var(--accent); letter-spacing: 8px; display: none; z-index: 100;
            background: rgba(0,0,0,0.6); padding: 15px; border: 1px solid var(--accent);
        }
    </style>
</head>
<body>

    <div id="viewport"></div>
    <div class="loader" id="loader">SIGNAL_PROCESSING...</div>
    <div class="ui-trigger" id="trigger"></div>

    <div class="side-panel" id="panel">
        <button class="toggle-btn" id="hideBtn"></button>
        
        <div class="header">
            <h1>RECON_STATION_V9</h1>
            <div style="font-size: 8px; opacity: 0.5;">ADVANCED SPATIAL DATA VISUALIZER</div>
        </div>

        <div style="flex: 1; overflow-y: auto;">
            <label class="btn btn-primary" style="display: block; text-align: center;">
                LOAD SOURCE DATA
                <input type="file" id="imageInput" style="display:none;" accept="image/*">
            </label>

            <div id="ui-controls" style="display: none;">
                <div class="control-row">
                    <div class="label-row"><span>CHAR_MAP</span></div>
                    <input type="text" id="glyphInput" class="text-input" placeholder="Dots if empty" maxlength="2">
                </div>

                <div class="control-row">
                    <div class="label-row"><span>DISTANCE (ZOOM)</span><span id="v-zoom">1000</span></div>
                    <input type="range" id="zoomRange" min="200" max="2500" value="1000">
                </div>

                <div class="control-row">
                    <div class="label-row"><span>DENSITY (STRIDE)</span><span id="v-stride">4</span></div>
                    <input type="range" id="strideRange" min="2" max="20" value="4">
                </div>

                <div class="control-row">
                    <div class="label-row"><span>Z-STRENGTH</span><span id="v-depth">200</span></div>
                    <input type="range" id="depthRange" min="0" max="800" value="200">
                </div>

                <div class="control-row">
                    <div class="label-row"><span>QUICK_VIEW</span></div>
                    <div class="view-grid">
                        <button class="btn" id="v-front">FRONT</button>
                        <button class="btn" id="v-top">TOP</button>
                        <button class="btn" id="v-left">LEFT</button>
                        <button class="btn" id="v-right">RIGHT</button>
                    </div>
                </div>

                <button class="btn" id="downloadBtn" style="color: var(--accent);">DOWNLOAD_SNAPSHOT</button>
                <button class="btn" id="resetBtn" style="margin-top: 8px; opacity: 0.6;">RESET_ALL</button>
            </div>
        </div>
        
        <div id="status" style="font-size: 9px; opacity: 0.5; margin-top: 20px;">INITIALIZING_AI...</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "@xenova/transformers": "https://cdn.jsdelivr.net/npm/@xenova/transformers@2.15.0"
            }
        }
    </script>

    <script id="vertexShader" type="x-shader/x-vertex">
        varying vec3 vColor;
        varying float vFlicker;
        uniform float uTime;
        uniform float uPointSize;
        float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }

        void main() {
            vColor = color;
            vFlicker = random(position.xy + uTime * 0.0005);
            vec3 pos = position;
            // 实时随机抖动
            pos.x += (random(position.xy + uTime) - 0.5) * 0.5;
            pos.y += (random(position.yx + uTime) - 0.5) * 0.5;
            
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_PointSize = uPointSize * (1000.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vColor;
        varying float vFlicker;
        uniform sampler2D uMap;
        uniform bool uUseMap;
        void main() {
            vec4 texColor = vec4(1.0);
            if(uUseMap) {
                texColor = texture2D(uMap, gl_PointCoord);
                if(texColor.a < 0.1) discard;
            } else {
                float dist = distance(gl_PointCoord, vec2(0.5));
                if(dist > 0.5) discard;
                texColor.a = 1.0 - smoothstep(0.4, 0.5, dist);
            }
            float f = (vFlicker > 0.98) ? 1.5 : 1.0;
            gl_FragColor = vec4(vColor * f, texColor.a * 0.9);
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { pipeline, env } from '@xenova/transformers';

        env.allowLocalModels = false;
        env.useBrowserCache = true;

        let scene, camera, renderer, controls, points, starfield;
        let depthEstimator, currentTexture;
        let lastImg = null, lastDepth = null;
        let clock = new THREE.Clock();

        async function init() {
            // Scene Setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 10000);
            camera.position.set(0, 0, 1000);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('viewport').appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            // 初始背景
            createStarfield();
            
            animate();

            // Load AI Model
            try {
                const pipe = await pipeline('depth-estimation', 'Xenova/depth-anything-small-hf');
                depthEstimator = pipe;
                document.getElementById('status').innerText = 'ENGINE_READY //';
            } catch (e) {
                document.getElementById('status').innerText = 'AI_LOAD_ERROR';
            }

            // UI Events
            setupEventListeners();
        }

        function createStarfield() {
            const count = 6000;
            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(count * 3);
            const speeds = new Float32Array(count);
            for(let i=0; i<count; i++){
                pos[i*3]=(Math.random()-0.5)*4000;
                pos[i*3+1]=(Math.random()-0.5)*4000;
                pos[i*3+2]=(Math.random()-0.5)*4000;
                speeds[i]= 1 + Math.random()*5;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
            const mat = new THREE.PointsMaterial({size: 3, color: 0x00f2ff, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending});
            starfield = new THREE.Points(geo, mat);
            starfield.userData.speeds = speeds;
            scene.add(starfield);
        }

        function setupEventListeners() {
            const panel = document.getElementById('panel');
            
            // Toggle UI
            const toggleFunc = () => panel.classList.toggle('hidden');
            document.getElementById('hideBtn').onclick = toggleFunc;
            document.getElementById('trigger').onclick = toggleFunc;

            // File Upload
            document.getElementById('imageInput').onchange = async (e) => {
                const file = e.target.files[0];
                if(!file || !depthEstimator) return;

                document.getElementById('loader').style.display = 'block';
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const result = await depthEstimator(ev.target.result);
                    lastDepth = result.depth;
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        lastImg = img;
                        rebuild();
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('ui-controls').style.display = 'block';
                    };
                };
                reader.readAsDataURL(file);
            };

            // Sliders
            document.getElementById('zoomRange').oninput = (e) => {
                camera.position.setLength(e.target.value);
                document.getElementById('v-zoom').innerText = e.target.value;
            };
            document.getElementById('strideRange').oninput = (e) => {
                document.getElementById('v-stride').innerText = e.target.value;
                rebuild();
            };
            document.getElementById('depthRange').oninput = (e) => {
                document.getElementById('v-depth').innerText = e.target.value;
                if(points) points.scale.z = e.target.value / 200;
            };

            // View Control
            const setView = (v) => {
                const len = camera.position.length();
                if(v==='front') camera.position.set(0,0,len);
                if(v==='top') camera.position.set(0,len,0);
                if(v==='left') camera.position.set(-len,0,0);
                if(v==='right') camera.position.set(len,0,0);
                controls.update();
            };
            document.getElementById('v-front').onclick = () => setView('front');
            document.getElementById('v-top').onclick = () => setView('top');
            document.getElementById('v-left').onclick = () => setView('left');
            document.getElementById('v-right').onclick = () => setView('right');

            // Character Map
            document.getElementById('glyphInput').oninput = (e) => {
                const val = e.target.value.trim();
                if(!val) currentTexture = null;
                else {
                    const canvas = document.createElement('canvas');
                    canvas.width = 64; canvas.height = 64;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'white'; ctx.font = 'bold 50px monospace';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(val, 32, 32);
                    currentTexture = new THREE.CanvasTexture(canvas);
                }
                if(points) {
                    points.material.uniforms.uMap.value = currentTexture;
                    points.material.uniforms.uUseMap.value = !!currentTexture;
                }
            };

            // Screenshot
            document.getElementById('downloadBtn').onclick = () => {
                const data = renderer.domElement.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'spatial_snapshot.png';
                link.href = data;
                link.click();
            };

            // Reset
            document.getElementById('resetBtn').onclick = () => location.reload();

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function rebuild() {
            if(!lastImg || !lastDepth) return;
            const { width, height, data } = lastDepth;
            const stride = parseInt(document.getElementById('strideRange').value);
            const zScale = parseFloat(document.getElementById('depthRange').value);
            
            const pos = [], col = [];
            const canvas = document.createElement('canvas');
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(lastImg, 0, 0, width, height);
            const pixels = ctx.getImageData(0, 0, width, height).data;

            let min = data[0], max = data[0];
            for(let v of data) { if(v < min) min = v; if(v > max) max = v; }

            const cx = width / 2, cy = height / 2;
            const maxD = Math.sqrt(cx*cx + cy*cy);

            for (let y = 0; y < height; y += stride) {
                for (let x = 0; x < width; x += stride) {
                    const i = y * width + x;
                    const d = Math.sqrt((x-cx)**2 + (y-cy)**2) / maxD;
                    if(Math.random() < d * 0.6) continue;

                    const nz = (data[i] - min) / (max - min);
                    pos.push(x - cx, cy - y, nz * zScale);
                    col.push(pixels[i*4]/255, pixels[i*4+1]/255, pixels[i*4+2]/255);
                }
            }

            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.Float32BufferAttribute(col, 3));
            geo.center();

            const mat = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uPointSize: { value: 3.0 },
                    uMap: { value: currentTexture },
                    uUseMap: { value: !!currentTexture }
                },
                vertexShader: document.getElementById('vertexShader').textContent,
                fragmentShader: document.getElementById('fragmentShader').textContent,
                transparent: true, vertexColors: true, depthWrite: false, blending: THREE.AdditiveBlending
            });

            if(points) scene.remove(points);
            if(starfield) starfield.visible = false;
            points = new THREE.Points(geo, mat);
            
            // 自动缩放适配
            const s = 800 / Math.max(width, height);
            points.scale.set(s, s, s);
            scene.add(points);
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            if(starfield && starfield.visible) {
                const p = starfield.geometry.attributes.position.array;
                const s = starfield.userData.speeds;
                for(let i=0; i<s.length; i++){
                    p[i*3+2] += s[i]; if(p[i*3+2] > 2000) p[i*3+2] = -2000;
                }
                starfield.geometry.attributes.position.needsUpdate = true;
            }
            if(points) points.material.uniforms.uTime.value = t * 1000;
            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
